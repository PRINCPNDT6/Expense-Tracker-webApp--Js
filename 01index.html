<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="container">
     <section class="Transactions">
            <div class="heading">
                <h3>Transactions History</h3>
                <hr>
            </div>

            <div class="historyBox">
                <ul>
                    <li><span class="historyBox-Text">Youtube Income</span> <span class="historyBox-Amount" >+ $ 3000</span><span class="status credit">C</span></li>
                    <li><span class="historyBox-Text">Room Rent</span> <span class="historyBox-Amount" >+ $ 3000</span><span class="status debit">D</span></li>
                    <li><span class="historyBox-Text">Salary</span> <span class="historyBox-Amount" >+ $ 3000</span><span class="status credit">C</span></li>
                    <li><span class="historyBox-Text">Food</span> <span class="historyBox-Amount" >+ $ 3000</span><span class="status debit">D</span></li>
                     
                </ul>
            </div>
        </section>
     <form class="form" id="TransactionsForm">
               <div class="userInfoBox">
                    <div class="userInfo ">
                        <label for="text">Text</label>
                        <input type="text" placeholder="Enter Text">
                    </div>
                    <div class="userInfo ">
                        <label for="Amount">Amount</label>
                        <input type="text" placeholder="Enter Amount">
                    </div>
               </div>
                <div class="button">
                    <button type="submit" id="Income" class="incomeBox">Income</button>
                    <button type="submit" id="Amount" class="ExpenseBox">Expense</button>
                </div>
            </form>
   </div>
</body>
</html>
